name: Build Full Offline Dev Bundle for sgl-model-gateway  
  
on:  
  workflow_dispatch:  
  
jobs:  
  build-offline-bundle:  
    runs-on: ubuntu-latest  
  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  
  
      - name: Set up Docker  
        run: |  
          sudo systemctl start docker  
          docker --version  
  
      - name: Write build script  
        run: |  
          cat > /tmp/build-bundle.sh << 'OUTER_EOF'  
          #!/bin/bash  
          set -e  
          export DEBIAN_FRONTEND=noninteractive  
          apt-get update  
  
          apt-get install -y curl wget git build-essential pkg-config libssl-dev python3 python3-pip ca-certificates tar gzip unzip gcc-10 g++-10 perl cmake  
  
          PROTOC_VERSION=3.20.1  
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip  
          unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d /usr/local  
          rm protoc-${PROTOC_VERSION}-linux-x86_64.zip  
          export PATH="/usr/local/bin:$PATH"  
          protoc --version  
  
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100  
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100  
          export CC=gcc-10  
          export CXX=g++-10  
  
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal  
          source "$HOME/.cargo/env"  
          rustup toolchain install 1.90.0 --profile minimal  
          rustup toolchain install nightly --profile minimal  
          rustup default 1.90.0  
  
          rustup component add rust-analyzer --toolchain 1.90.0  
  
          cd sgl-model-gateway  
  
          cargo update  
  
          cargo build --locked --features vendored-openssl  
  
          mkdir -p .cargo  
          if [ -f .cargo/config.toml ]; then  
            cp .cargo/config.toml .cargo/config.toml.bak  
          fi  
          cargo vendor >> .cargo/config.toml  
  
          cargo install cargo-watch --locked  
  
          BUNDLE_DIR="/workspace/sgl-model-gateway-offline-bundle"  
          mkdir -p "$BUNDLE_DIR/docs"  
  
          tar -czf "$BUNDLE_DIR/rust-toolchain.tar.gz" -C "$HOME/.rustup/toolchains" 1.90.0-x86_64-unknown-linux-gnu nightly-x86_64-unknown-linux-gnu  
  
          tar -czf "$BUNDLE_DIR/cargo-vendor.tar.gz" -C "$PWD" vendor  
  
          SRC_FILES="src Cargo.toml Cargo.lock .cargo"  
          if [ -d "proto" ]; then  
            SRC_FILES="$SRC_FILES proto"  
          fi  
          tar -czf "$BUNDLE_DIR/sgl-model-gateway-src.tar.gz" -C "$PWD" $SRC_FILES  
  
          tar -czf "$BUNDLE_DIR/cargo-dev-tools.tar.gz" -C "$HOME/.cargo/bin" cargo-watch  
  
          cat > "$BUNDLE_DIR/README.md" << 'EOF'  
          # sgl-model-gateway Offline Development Bundle  
  
          ## Prerequisites (Ubuntu 20.04 standard install already includes these)  
          - gcc (gcc-9 or later)  
          - make  
          - perl  
  
          ## Contents  
          - rust-toolchain.tar.gz : Rust 1.90.0 + nightly (includes rust-analyzer)  
          - cargo-vendor.tar.gz   : All Rust crate sources  
          - sgl-model-gateway-src.tar.gz : Project source code  
          - cargo-dev-tools.tar.gz : cargo-watch  
          - setup-dev.sh          : Development environment (use this for cargo run)  
          - setup-offline.sh      : Production release build  
  
          ## Quick Start (development, like go run main.go)  
          chmod +x setup-dev.sh && ./setup-dev.sh  
          cd sgl-model-gateway  
          cargo run --offline --features vendored-openssl -- --help  
          EOF  
  
          cat > "$BUNDLE_DIR/docs/environment-requirements.md" << 'EOF'  
          ## Environment Requirements  
          - OS: Ubuntu 20.04 LTS (Focal Fossa)  
          - Architecture: x86_64  
          - Disk space: ~2GB free  
          - No internet required after unpacking  
          - System tools: gcc, make, perl (included in Ubuntu 20.04 standard install)  
          EOF  
  
          cat > "$BUNDLE_DIR/docs/how-to-deploy.md" << 'EOF'  
          ## Development (like go run main.go)  
          chmod +x setup-dev.sh && ./setup-dev.sh  
          cd sgl-model-gateway  
          # First run (compiles all deps, takes a few minutes):  
          cargo run --offline --features vendored-openssl -- --help  
          # After editing source, just run again (incremental compile):  
          cargo run --offline --features vendored-openssl -- --worker-urls http://localhost:8000  
  
          ## Production Build  
          chmod +x setup-offline.sh && ./setup-offline.sh  
          ./sgl-model-gateway/target/release/sgl-model-gateway --help  
          EOF  
  
          cat > "$BUNDLE_DIR/setup-dev.sh" << 'DEV_EOF'  
          #!/bin/bash  
          set -e  
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"  
          echo "Setting up sgl-model-gateway development environment..."  
  
          echo "Extracting Rust toolchain..."  
          mkdir -p "$HOME/.rustup/toolchains"  
          tar -xzf "$SCRIPT_DIR/rust-toolchain.tar.gz" -C "$HOME/.rustup/toolchains"  
  
          mkdir -p "$HOME/.cargo/bin"  
  
          cat > "$HOME/.cargo/bin/rustup" << 'RUSTUP_EOF'  
          #!/bin/bash  
          if [ "$1" = "run" ] && [ "$2" = "nightly" ]; then  
            shift 2  
            CMD="$1"; shift  
            exec "$HOME/.rustup/toolchains/nightly-x86_64-unknown-linux-gnu/bin/$CMD" "$@"  
          fi  
          TOOLCHAIN="1.90.0-x86_64-unknown-linux-gnu"  
          CMD="$1"; shift  
          exec "$HOME/.rustup/toolchains/$TOOLCHAIN/bin/$CMD" "$@"  
          RUSTUP_EOF  
          chmod +x "$HOME/.cargo/bin/rustup"  
  
          ln -sf "$HOME/.rustup/toolchains/1.90.0-x86_64-unknown-linux-gnu/bin/cargo" "$HOME/.cargo/bin/cargo"  
          ln -sf "$HOME/.rustup/toolchains/1.90.0-x86_64-unknown-linux-gnu/bin/rustc" "$HOME/.cargo/bin/rustc"  
          ln -sf "$HOME/.rustup/toolchains/1.90.0-x86_64-unknown-linux-gnu/bin/rust-analyzer" "$HOME/.cargo/bin/rust-analyzer"  
  
          if ! grep -q ".cargo/bin" ~/.bashrc 2>/dev/null; then  
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> ~/.bashrc  
          fi  
          export PATH="$HOME/.cargo/bin:$PATH"  
  
          echo "Extracting development tools..."  
          tar -xzf "$SCRIPT_DIR/cargo-dev-tools.tar.gz" -C "$HOME/.cargo/bin"  
          chmod +x "$HOME/.cargo/bin/cargo-watch"  
  
          echo "Extracting project source..."  
          mkdir -p "$SCRIPT_DIR/sgl-model-gateway"  
          tar -xzf "$SCRIPT_DIR/sgl-model-gateway-src.tar.gz" -C "$SCRIPT_DIR/sgl-model-gateway"  
          tar -xzf "$SCRIPT_DIR/cargo-vendor.tar.gz" -C "$SCRIPT_DIR/sgl-model-gateway"  
  
          echo ""  
          echo "Development environment ready!"  
          echo ""  
          echo "To start developing:"  
          echo "  cd $SCRIPT_DIR/sgl-model-gateway"  
          echo "  cargo run --offline --features vendored-openssl -- --help"  
          echo ""  
          echo "After editing source files, just run again (incremental compile):"  
          echo "  cargo run --offline --features vendored-openssl -- --worker-urls http://localhost:8000"  
          echo ""  
          echo "Auto-rebuild on file changes:"  
          echo "  cargo watch -x 'run --offline --features vendored-openssl -- --help'"  
          echo ""  
          echo "IDE support (rust-analyzer):"  
          echo "  rust-analyzer is available at: $HOME/.cargo/bin/rust-analyzer"  
          DEV_EOF  
  
          cat > "$BUNDLE_DIR/setup-offline.sh" << 'SETUP_EOF'  
          #!/bin/bash  
          set -e  
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"  
          echo "Setting up sgl-model-gateway production environment..."  
  
          echo "Extracting Rust toolchain..."  
          mkdir -p "$HOME/.rustup/toolchains"  
          tar -xzf "$SCRIPT_DIR/rust-toolchain.tar.gz" -C "$HOME/.rustup/toolchains"  
  
          mkdir -p "$HOME/.cargo/bin"  
          ln -sf "$HOME/.rustup/toolchains/1.90.0-x86_64-unknown-linux-gnu/bin/cargo" "$HOME/.cargo/bin/cargo"  
          ln -sf "$HOME/.rustup/toolchains/1.90.0-x86_64-unknown-linux-gnu/bin/rustc" "$HOME/.cargo/bin/rustc"  
  
          if ! grep -q ".cargo/bin" ~/.bashrc 2>/dev/null; then  
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> ~/.bashrc  
          fi  
          export PATH="$HOME/.cargo/bin:$PATH"  
  
          echo "Extracting project source..."  
          mkdir -p "$SCRIPT_DIR/sgl-model-gateway"  
          tar -xzf "$SCRIPT_DIR/sgl-model-gateway-src.tar.gz" -C "$SCRIPT_DIR/sgl-model-gateway"  
          tar -xzf "$SCRIPT_DIR/cargo-vendor.tar.gz" -C "$SCRIPT_DIR/sgl-model-gateway"  
  
          echo "Building sgl-model-gateway (release)..."  
          cd "$SCRIPT_DIR/sgl-model-gateway"  
          cargo build --release --offline --features vendored-openssl  
          echo ""  
          echo "Done! Binary at: $SCRIPT_DIR/sgl-model-gateway/target/release/sgl-model-gateway"  
          SETUP_EOF  
  
          chmod +x "$BUNDLE_DIR/setup-dev.sh"  
          chmod +x "$BUNDLE_DIR/setup-offline.sh"  
          echo "Offline bundle created at: $BUNDLE_DIR"  
          ls -lh "$BUNDLE_DIR/"  
          OUTER_EOF  
          chmod +x /tmp/build-bundle.sh  
  
      - name: Build and run Ubuntu 20.04 container to prepare offline bundle  
        run: docker run --rm -v "$PWD:/workspace" -v "/tmp/build-bundle.sh:/build-bundle.sh" -w /workspace ubuntu:20.04 bash /build-bundle.sh  
  
      - name: Upload offline bundle as artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: sgl-model-gateway-offline-bundle  
          path: sgl-model-gateway-offline-bundle/  
          retention-days: 7
