name: Build Full Offline Dev Bundle for sgl-model-gateway  
  
on:  
  workflow_dispatch:  
  
jobs:  
  build-offline-dev-bundle:  
    runs-on: ubuntu-latest  
  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4  
  
      - name: Set up Docker  
        run: |  
          sudo systemctl start docker  
          docker --version  
  
      - name: Build full offline dev bundle in Ubuntu 20.04 container  
        run: |  
          chmod +x sgl-model-gateway/scripts/build-offline-bundle.sh  
          docker run --rm \  
            -v "$PWD:/workspace" \  
            -w /workspace \  
            ubuntu:20.04 \  
            bash sgl-model-gateway/scripts/build-offline-bundle.sh  
  
      - name: Upload offline dev bundle as artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: sgl-model-gateway-offline-dev-bundle  
          path: sgl-model-gateway-offline-dev-bundle/  
          retention-days: 7
